apiVersion: batch/v1
kind: CronJob
metadata:
  name: water-tracker
  namespace: default
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 10
  failedJobsHistoryLimit: 10
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: water-tracker
              image: ghcr.io/vcx4ka/water-tracker:latest
              imagePullPolicy: Always
              env:
                - name: DYNAMODB_TABLE
                  value: "water-tracking"
                - name: S3_BUCKET
                  value: "ds5220-dp2-vcx4ka"
                - name: AWS_REGION
                  value: "us-east-1"